blueprint:
  name: Apollo CAST-1 WizMote
  description: |
    🎛️ **WizMote buttons, all in one place.**

    ▶️ On-device - Play, Volume, Next... work even if HA is offline.

    🏠 Send HA Event - runs that button's Custom action.

    💾 Auto-applied to your CAST-1 on start and save.

    👇 Pick your CAST-1 to begin.
  domain: automation
  source_url: https://github.com/ApolloAutomation/CAST-1/blob/main/Blueprints/CAST-1-WizMote.yaml
  input:
    cast1_device:
      name: Apollo CAST-1
      description: Select your CAST-1 from the dropdown!
      selector:
        device:
          filter:
            - integration: esphome
              manufacturer: ApolloAutomation
              model: CAST-1-W
            - integration: esphome
              manufacturer: ApolloAutomation
              model: CAST-1-ETH
          multiple: false
    button_on:
      name: "On button"
      icon: mdi:gesture-tap-button
      collapsed: true
      input:
        on_mode:
          name: Action
          description: "Default: Play"
          default: "Play"
          selector:
            select:
              mode: dropdown
              options: &actions
                - "Nothing"
                - "Play"
                - "Pause"
                - "Play / Pause"
                - "Next Track"
                - "Previous Track"
                - "Volume Up"
                - "Volume Down"
                - "Toggle Light"
                - "Send HA Event"
        on_action:
          name: Custom action
          description: Run when Action is set to "Send HA Event".
          default: []
          selector:
            action:
    button_off:
      name: "Off button"
      icon: mdi:gesture-tap-button
      collapsed: true
      input:
        off_mode:
          name: Action
          description: "Default: Pause"
          default: "Pause"
          selector:
            select:
              mode: dropdown
              options: *actions
        off_action:
          name: Custom action
          description: Run when Action is set to "Send HA Event".
          default: []
          selector:
            action:
    button_night:
      name: "Night button"
      icon: mdi:gesture-tap-button
      collapsed: true
      input:
        night_mode:
          name: Action
          description: "Default: Toggle Light"
          default: "Toggle Light"
          selector:
            select:
              mode: dropdown
              options: *actions
        night_action:
          name: Custom action
          description: Run when Action is set to "Send HA Event".
          default: []
          selector:
            action:
    button_bright_up:
      name: "Brightness Up button"
      icon: mdi:gesture-tap-button
      collapsed: true
      input:
        bright_up_mode:
          name: Action
          description: "Default: Volume Up"
          default: "Volume Up"
          selector:
            select:
              mode: dropdown
              options: *actions
        bright_up_action:
          name: Custom action
          description: Run when Action is set to "Send HA Event".
          default: []
          selector:
            action:
    button_bright_down:
      name: "Brightness Down button"
      icon: mdi:gesture-tap-button
      collapsed: true
      input:
        bright_down_mode:
          name: Action
          description: "Default: Volume Down"
          default: "Volume Down"
          selector:
            select:
              mode: dropdown
              options: *actions
        bright_down_action:
          name: Custom action
          description: Run when Action is set to "Send HA Event".
          default: []
          selector:
            action:
    button_1:
      name: "Button 1"
      icon: mdi:gesture-tap-button
      collapsed: true
      input:
        button_1_mode:
          name: Action
          description: "Default: Previous Track"
          default: "Previous Track"
          selector:
            select:
              mode: dropdown
              options: *actions
        button_1_action:
          name: Custom action
          description: Run when Action is set to "Send HA Event".
          default: []
          selector:
            action:
    button_2:
      name: "Button 2"
      icon: mdi:gesture-tap-button
      collapsed: true
      input:
        button_2_mode:
          name: Action
          description: "Default: Next Track"
          default: "Next Track"
          selector:
            select:
              mode: dropdown
              options: *actions
        button_2_action:
          name: Custom action
          description: Run when Action is set to "Send HA Event".
          default: []
          selector:
            action:
    button_3:
      name: "Button 3"
      icon: mdi:gesture-tap-button
      collapsed: true
      input:
        button_3_mode:
          name: Action
          description: "Default: Send HA Event"
          default: "Send HA Event"
          selector:
            select:
              mode: dropdown
              options: *actions
        button_3_action:
          name: Custom action
          description: Run when Action is set to "Send HA Event".
          default: []
          selector:
            action:
    button_4:
      name: "Button 4"
      icon: mdi:gesture-tap-button
      collapsed: true
      input:
        button_4_mode:
          name: Action
          description: "Default: Send HA Event"
          default: "Send HA Event"
          selector:
            select:
              mode: dropdown
              options: *actions
        button_4_action:
          name: Custom action
          description: Run when Action is set to "Send HA Event".
          default: []
          selector:
            action:

mode: queued
max: 10

variables:
  cast1_device: !input cast1_device

# Two jobs:
#  - on HA start / save (id: sync) push each button's chosen Action down to the
#    matching WizMote select on the device, so the device page mirrors this UI.
#  - on a button event (the device only emits one when its Action is "Send HA
#    Event") run that button's custom action.
triggers:
  - trigger: homeassistant
    event: start
    id: sync
  - trigger: event
    event_type: automation_reloaded
    id: sync
  - trigger: event
    event_type: esphome.cast1_wizmote_event
    event_data: { button: "on" }
    id: "on"
  - trigger: event
    event_type: esphome.cast1_wizmote_event
    event_data: { button: "off" }
    id: "off"
  - trigger: event
    event_type: esphome.cast1_wizmote_event
    event_data: { button: "night" }
    id: "night"
  - trigger: event
    event_type: esphome.cast1_wizmote_event
    event_data: { button: "brightness_up" }
    id: "brightness_up"
  - trigger: event
    event_type: esphome.cast1_wizmote_event
    event_data: { button: "brightness_down" }
    id: "brightness_down"
  - trigger: event
    event_type: esphome.cast1_wizmote_event
    event_data: { button: "1" }
    id: "button_1"
  - trigger: event
    event_type: esphome.cast1_wizmote_event
    event_data: { button: "2" }
    id: "button_2"
  - trigger: event
    event_type: esphome.cast1_wizmote_event
    event_data: { button: "3" }
    id: "button_3"
  - trigger: event
    event_type: esphome.cast1_wizmote_event
    event_data: { button: "4" }
    id: "button_4"

actions:
  - choose:
      - conditions:
          - condition: trigger
            id: sync
        sequence:
          - repeat:
              for_each:
                - { suffix: "wizmote_on", option: !input on_mode }
                - { suffix: "wizmote_off", option: !input off_mode }
                - { suffix: "wizmote_night", option: !input night_mode }
                - { suffix: "wizmote_brightness_up", option: !input bright_up_mode }
                - { suffix: "wizmote_brightness_down", option: !input bright_down_mode }
                - { suffix: "wizmote_button_1", option: !input button_1_mode }
                - { suffix: "wizmote_button_2", option: !input button_2_mode }
                - { suffix: "wizmote_button_3", option: !input button_3_mode }
                - { suffix: "wizmote_button_4", option: !input button_4_mode }
              sequence:
                - action: select.select_option
                  continue_on_error: true
                  target:
                    entity_id: >-
                      {{ device_entities(cast1_device)
                         | select('search', '_' ~ repeat.item.suffix ~ '$')
                         | list | first }}
                  data:
                    option: "{{ repeat.item.option }}"
      - conditions:
          - condition: trigger
            id: "on"
        sequence: !input on_action
      - conditions:
          - condition: trigger
            id: "off"
        sequence: !input off_action
      - conditions:
          - condition: trigger
            id: "night"
        sequence: !input night_action
      - conditions:
          - condition: trigger
            id: "brightness_up"
        sequence: !input bright_up_action
      - conditions:
          - condition: trigger
            id: "brightness_down"
        sequence: !input bright_down_action
      - conditions:
          - condition: trigger
            id: "button_1"
        sequence: !input button_1_action
      - conditions:
          - condition: trigger
            id: "button_2"
        sequence: !input button_2_action
      - conditions:
          - condition: trigger
            id: "button_3"
        sequence: !input button_3_action
      - conditions:
          - condition: trigger
            id: "button_4"
        sequence: !input button_4_action
