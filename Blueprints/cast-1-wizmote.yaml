blueprint:
  name: Apollo CAST-1 WizMote
  description: >
    Run Home Assistant actions from an Apollo CAST-1 WizMote.

    On the CAST-1, set any button's dropdown to "Send HA Event" (Button 3 and 4
    ship that way). Then choose what each button does here. Buttons left on a
    built-in action (Play, Volume, etc.) are handled on the device and never
    reach this automation.
  domain: automation
  source_url: https://github.com/ApolloAutomation/CAST-1/blob/main/Blueprints/cast-1-wizmote.yaml
  input:
    on_action:
      name: "On"
      default: []
      selector:
        action:
    off_action:
      name: "Off"
      default: []
      selector:
        action:
    night_action:
      name: "Night"
      default: []
      selector:
        action:
    bright_up_action:
      name: "Brightness Up"
      default: []
      selector:
        action:
    bright_down_action:
      name: "Brightness Down"
      default: []
      selector:
        action:
    button_1_action:
      name: "Button 1"
      default: []
      selector:
        action:
    button_2_action:
      name: "Button 2"
      default: []
      selector:
        action:
    button_3_action:
      name: "Button 3"
      default: []
      selector:
        action:
    button_4_action:
      name: "Button 4"
      default: []
      selector:
        action:

mode: queued
max: 10

# One event trigger per button, matched natively on the event's button value
# (no templates, so HA's numeric coercion can't break the match). The button
# values are quoted so "on"/"off" aren't read as YAML booleans.
triggers:
  - trigger: event
    event_type: esphome.cast1_wizmote_event
    event_data:
      button: "on"
    id: "on"
  - trigger: event
    event_type: esphome.cast1_wizmote_event
    event_data:
      button: "off"
    id: "off"
  - trigger: event
    event_type: esphome.cast1_wizmote_event
    event_data:
      button: "night"
    id: "night"
  - trigger: event
    event_type: esphome.cast1_wizmote_event
    event_data:
      button: "brightness_up"
    id: "brightness_up"
  - trigger: event
    event_type: esphome.cast1_wizmote_event
    event_data:
      button: "brightness_down"
    id: "brightness_down"
  - trigger: event
    event_type: esphome.cast1_wizmote_event
    event_data:
      button: "1"
    id: "button_1"
  - trigger: event
    event_type: esphome.cast1_wizmote_event
    event_data:
      button: "2"
    id: "button_2"
  - trigger: event
    event_type: esphome.cast1_wizmote_event
    event_data:
      button: "3"
    id: "button_3"
  - trigger: event
    event_type: esphome.cast1_wizmote_event
    event_data:
      button: "4"
    id: "button_4"

actions:
  - choose:
      - conditions:
          - condition: trigger
            id: "on"
        sequence: !input on_action
      - conditions:
          - condition: trigger
            id: "off"
        sequence: !input off_action
      - conditions:
          - condition: trigger
            id: "night"
        sequence: !input night_action
      - conditions:
          - condition: trigger
            id: "brightness_up"
        sequence: !input bright_up_action
      - conditions:
          - condition: trigger
            id: "brightness_down"
        sequence: !input bright_down_action
      - conditions:
          - condition: trigger
            id: "button_1"
        sequence: !input button_1_action
      - conditions:
          - condition: trigger
            id: "button_2"
        sequence: !input button_2_action
      - conditions:
          - condition: trigger
            id: "button_3"
        sequence: !input button_3_action
      - conditions:
          - condition: trigger
            id: "button_4"
        sequence: !input button_4_action
