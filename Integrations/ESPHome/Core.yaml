substitutions:
  version: "26.7.22.1"
  # Default update channel on first boot (no stored user choice yet, i.e. a
  # fresh flash). The beta-channel builds override this to "Beta" (see
  # Integrations/ESPHome/beta-channel/) so firmware obtained from the beta
  # channel keeps tracking it instead of offering a stable "downgrade".
  firmware_channel_default: "Stable"
  # Manifest URL bases. Stable = GitHub Pages (main branch builds).
  # Beta = rolling "beta-fw" pre-release assets (beta branch builds).
  stable_manifest_base: "https://apolloautomation.github.io/CAST-1"
  beta_manifest_base: "https://github.com/ApolloAutomation/CAST-1/releases/download/beta-fw"


packages:
  wizmote: !include wizmote.yaml

esphome:
  # List form so package merging concatenates with each variant's own on_boot
  # entries (mapping form would be replaced by the variant's block instead).
  on_boot:
    # Point the update entity at the selected type/channel manifest.
    - priority: -100
      then:
        - script.execute: apply_ota_source
    # Re-apply the Bluetooth Proxy switch after all components set up, so BLE
    # scanning matches the persisted switch (proxy stays off by default).
    - priority: -300
      then:
        - if:
            condition:
              switch.is_on: bluetooth_proxy_switch
            then:
              - esp32_ble_tracker.start_scan:
                  continuous: true
            else:
              - esp32_ble_tracker.stop_scan:

esp32:
  variant: ESP32S3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"

      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"

      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"

      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"

# BT allocations go to PSRAM first (CONFIG_BT_* options above), keeping
# internal RAM free for the audio pipelines.
esp32_ble_tracker:
  id: ble_tracker
  scan_parameters:
    continuous: true

bluetooth_proxy:

api:
  encryption:

globals:
  - id: cycleCounter
    type: int
    restore_value: no
    initial_value: '0'
  - id: button_press_timestamp
    restore_value: no
    type: uint32_t
    initial_value: '0'
  - id: runTest
    restore_value: yes
    type: bool
    initial_value: "true"
  - id: testCycleCount
    type: int
    restore_value: no
    initial_value: "0"
  - id: current_volume
    type: float
    initial_value: '0.2'
  - id: announcement_triggered
    type: bool
    initial_value: 'false'

psram:
  mode: octal
  speed: 80MHz
  # All CAST-1 PCBs have PSRAM, so guarantee it (fail boot if absent). This flips
  # ESPHome's psram_guaranteed flag, which unlocks the high-performance network
  # tier: 512 WiFi RX buffers / 32 TX buffers and a much larger TCP receive
  # window instead of the conservative defaults. Music Assistant bulk-downloads
  # each track faster than realtime, and the small TCP window is what its flow
  # control slams into at track changes/seeks. (VPE sets this too.)
  ignore_not_found: false

web_server:
  port: 80
  version: 3

http_request:
  verify_ssl: true
  # GitHub release-asset downloads answer with a redirect carrying a
  # ~3.6 KB Content-Security-Policy header; each header line must fit
  # this buffer or the request fails with "HTTP_CLIENT: Out of buffer".
  buffer_size_rx: 5120
  # The redirect target is a signed URL with a ~850-char query string; the
  # follow-up request line must fit the TX buffer or esp_http_client_open
  # fails with "Out of buffer" before sending anything.
  buffer_size_tx: 2048

i2c:
  sda: GPIO47
  scl: GPIO48
  id: bus_a

button:
  - platform: restart
    icon: mdi:power-cycle
    name: "ESP Reboot"
  - platform: template
    name: "Firmware Update"
    id: update_firmware
    icon: mdi:cloud-download
    entity_category: config
    on_press:
      - logger.log: "Applying firmware update for the selected type and channel"
      - delay: 3s
      - script.execute: apply_ota_source
      - script.wait: apply_ota_source
      # The manifest fetch runs in its own task; give it a fixed window to land
      # (update.is_available stays false for same-version switches).
      - delay: 5s
      - lambda: id(update_http_request).perform(true);

binary_sensor:
  - platform: status
    name: Online
    id: ink_ha_connected

  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
      ignore_strapping_warning: true
      mode:
        input: true
        pullup: true
    id: reset_button
    on_press:
      then:
        - lambda: |-
            id(button_press_timestamp) = millis();
    on_release:
      then:
        - lambda: |-
            if (millis() - id(button_press_timestamp) >= 8000) {
              id(factory_reset_switch).turn_on();
            }
            else if (millis() - id(button_press_timestamp) >= 1000) {
              // StatusCheck
              id(statusCheck).execute();
              delay(3000);
              id(testCycleCount) = 0;
              id(runTest) = true;
              id(testScript).execute();
            }

sensor:
  - platform: internal_temperature
    name: "ESP Temperature"
    id: sys_esp_temperature
    disabled_by_default: true

  - platform: uptime
    name: Uptime
    id: sys_uptime
    update_interval: 60s

switch:
  - platform: factory_reset
    id: factory_reset_switch
    disabled_by_default: true

  - platform: template
    name: "Bluetooth Proxy"
    id: bluetooth_proxy_switch
    icon: mdi:bluetooth
    entity_category: "config"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    on_turn_on:
      - esp32_ble_tracker.start_scan:
          continuous: true
    on_turn_off:
      - esp32_ble_tracker.stop_scan:

text_sensor:
  - platform: sendspin
    type: title
    name: Track Title

  - platform: sendspin
    type: artist
    name: Artist

  - platform: sendspin
    type: album
    name: Album

  - platform: version
    name: "ESPHome Version"
    hide_timestamp: true
    entity_category: "diagnostic"

  - platform: template
    name: "Apollo Firmware Version"
    id: apollo_firmware_version
    update_interval: never
    entity_category: "diagnostic"

light:
  - platform: esp32_rmt_led_strip
    id: rgb_light
    name: "RGB Light"
    pin: GPIO4
    default_transition_length: 0s
    chipset: WS2812
    num_leds: 4
    rgb_order: grb
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 1000ms
          update_interval: 1000ms
          min_brightness: 50%
          max_brightness: 100%
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%

select:
  - platform: template
    id: firmware_channel
    name: "Firmware Channel"
    icon: "mdi:source-branch"
    entity_category: config
    optimistic: true
    restore_value: true
    options:
      - "Stable"
      - "Beta"
    initial_option: "${firmware_channel_default}"
    on_value:
      then:
        - script.execute: apply_ota_source

audio_dac:
  - platform: pcm5122
    id: external_dac
    i2c_id: bus_a
    address: 0x4D
    bits_per_sample: 16bit

i2s_audio:
- id: i2s_out
  i2s_lrclk_pin: GPIO10
  i2s_bclk_pin: GPIO14
  
speaker:
  - platform: i2s_audio
    id: i2s_speaker_id
    i2s_audio_id: i2s_out
    sample_rate: 48000
    i2s_dout_pin: GPIO9
    bits_per_sample: 16bit
    dac_type: external
    channel: stereo
    timeout: never
    buffer_duration: 100ms

  - platform: mixer
    id: mixer_speaker_id
    output_speaker: i2s_speaker_id
    num_channels: 2
    task_stack_in_psram: true
    source_speakers:
      - id: announcement_mixer_input
        timeout: never
      - id: media_mixer_input
        timeout: never

  # Resampler task stacks stay in internal RAM (default): they are hot audio
  # tasks, and a PSRAM stack contends with the decode/ring buffers already in
  # PSRAM during Music Assistant's bulk track transfers. (Matches VPE.)
  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixer_input
    sample_rate: 48000
    bits_per_sample: 16

  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixer_input
    sample_rate: 48000
    bits_per_sample: 16


sendspin:
  id: sendspin_hub
  # Keep the sendspin server task's stack in internal RAM (VPE does the same).
  # That single task services the websocket: audio ingest, JSON, and the
  # time-sync replies the clock filter depends on — slowing it down with a
  # PSRAM stack skews time sync, which surfaces as hard-sync silence gaps at
  # track changes.
  task_stack_in_psram: false

media_source:
  - platform: sendspin
    id: sendspin_source
    # decode_memory deliberately unset (component default, matches VPE)

  - platform: audio_http
    id: http_media_source
    buffer_size: 500000

  - platform: audio_http
    id: http_announcement_source
    buffer_size: 250000

media_player:
  - platform: sendspin
    id: sendspin_group_media_player
    name: "Apollo CAST-1 Sendspin Player"

  - platform: speaker_source
    id: external_media_player
    name: "Apollo CAST-1 Player"
    volume_increment: 0.05

    announcement_pipeline:
      format: FLAC     # FLAC is the least processor intensive codec
      num_channels: 1  # Stereo audio is unnecessary for announcements
      sample_rate: 48000
      speaker: announcement_resampling_speaker
      sources:
        - http_announcement_source

    media_pipeline:
      speaker: media_resampling_speaker
      format: FLAC     # FLAC is the least processor intensive codec
      num_channels: 2
      sample_rate: 48000
      sources:
        - sendspin_source
        - http_media_source

    on_announcement:
      - if:
          condition:
            - lambda: return (!id(announcement_triggered));
          then:
            - lambda: |-
                id(announcement_triggered) = true;
                id(current_volume) = id(external_media_player).volume;
            - light.turn_on:
                id: rgb_light
                blue: 100%
                red: 0%
                green: 100%
                brightness: 50%
            - mixer_speaker.apply_ducking:
                id: media_mixer_input
                decibel_reduction: 40
                duration: 0.0s
            - wait_until:
                media_player.is_announcing: external_media_player
            - wait_until:
                - not:
                    media_player.is_announcing: external_media_player
            - mixer_speaker.apply_ducking:
                id: media_mixer_input
                decibel_reduction: 0
                duration: 1.0s
            - light.turn_off:
                id: rgb_light
            - lambda: id(announcement_triggered) = false;

    on_state:
      # Core pcm5122 boots muted; nothing else unmutes the external DAC, so
      # unmute it on every state change (idempotent).
      - audio_dac.mute_off: external_dac
      - if:
          condition:
            and:
              - lambda: return (!id(announcement_triggered));
              - not:
                  media_player.is_announcing: external_media_player
          then:
            - mixer_speaker.apply_ducking:
                id: media_mixer_input
                decibel_reduction: 0
                duration: 1.0s





script:
  - id: apply_ota_source
    # Sets the OTA source URL from the two selectors: Firmware Type (WiFi/Ethernet)
    # x Firmware Channel (Stable/Beta). Stable = GitHub Pages (main branch builds),
    # Beta = rolling "beta-fw" release assets.
    then:
      - lambda: |-
          const bool eth  = id(firmware_selector).current_option() == "Ethernet";
          const bool beta = id(firmware_channel).current_option() == "Beta";
          std::string url;
          if (beta) {
            url = eth
              ? "${beta_manifest_base}/manifest-e.json"
              : "${beta_manifest_base}/manifest-w.json";
          } else {
            url = eth
              ? "${stable_manifest_base}/firmware-e/manifest.json"
              : "${stable_manifest_base}/firmware-w/manifest.json";
          }
          ESP_LOGI("firmware", "OTA manifest set to: %s", url.c_str());
          id(update_http_request).set_source_url(url);
      - component.update: update_http_request
  - id: statusCheck
    then:
      - if:
          condition:
            - lambda: 'return id(ink_ha_connected).state;'
          then:
            - logger.log: "Apollo Automation: Connected To HA"
            - light.turn_on: 
                id: rgb_light
                brightness: 100%
                red: 0%
                green: 0%
                blue: 100%
      - delay: 5s
      - light.turn_off: rgb_light
  
  - id: testScript
    then:
      if: 
        condition:
          - lambda: "return id(runTest) == true;"
        then:
          - lambda: "id(runTest) = false;"
          - lambda: "id(testCycleCount) = 0;"
          - delay: 2s
          - while:
              condition:
                - lambda: "return id(testCycleCount) < 5;"
              then:
                - lambda: "id(runTest) = false;"
                - delay: 1s
                - lambda: "id(testCycleCount) += 1;"

          ## TODO: Update
          - if:
              condition:
                - lambda: "return true;"
              then:
                - lambda: "id(runTest) = false;"
                - light.turn_on:
                    id: rgb_light
                    red: 0%
                    green: 100%
                    blue: 0%
                - delay: 5s
                - light.turn_on:
                    id: rgb_light
                    red: 0%
                    green: 0%
                    blue: 0%
                - light.turn_off:
                    id: rgb_light
                
              else:
                - lambda: "id(runTest) = false;"
                - light.turn_on:
                    id: rgb_light
                    red: 100%
                    green: 0%
                    blue: 0%
                - delay: 5s
                - light.turn_on:
                    id: rgb_light
                    red: 0%
                    green: 0%
                    blue: 0%
                - light.turn_off:
                    id: rgb_light
