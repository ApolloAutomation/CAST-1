substitutions:
  version: "26.6.18.2"

  # WizMote button codes (ESP-NOW)
  WIZMOTE_BUTTON_ON: "1"
  WIZMOTE_BUTTON_OFF: "2"
  WIZMOTE_BUTTON_NIGHT: "3"
  WIZMOTE_BUTTON_BRIGHT_UP: "9"
  WIZMOTE_BUTTON_BRIGHT_DOWN: "8"
  WIZMOTE_BUTTON_1: "16"
  WIZMOTE_BUTTON_2: "17"
  WIZMOTE_BUTTON_3: "18"
  WIZMOTE_BUTTON_4: "19"
  WIZMOTE_MAC_ADDRESS: "00:00:00:00:00:00"

esp32:
  variant: ESP32S3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"

      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"

      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"

      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"

api:

globals:
  - id: cycleCounter
    type: int
    restore_value: no
    initial_value: '0'
  - id: button_press_timestamp
    restore_value: no
    type: uint32_t
    initial_value: '0'
  - id: runTest
    restore_value: yes
    type: bool
    initial_value: "true"
  - id: testCycleCount
    type: int
    restore_value: no
    initial_value: "0"
  - id: current_volume
    type: float
    initial_value: '0.2'
  - id: announcement_triggered
    type: bool
    initial_value: 'false'
  # WizMote (ESP-NOW)
  - id: wizmote_last_sequence
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: wizmote_previous_mac
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: wizmote_last_packet_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: wizmote_scan_channel
    type: uint8_t
    restore_value: no
    initial_value: '1'

psram:
  mode: octal
  speed: 80MHz

web_server:
  port: 80
  version: 3

i2c:
  sda: GPIO47
  scl: GPIO48
  id: bus_a

button:
  - platform: restart
    icon: mdi:power-cycle
    name: "ESP Reboot"
  - platform: template
    name: "Firmware Update"
    id: update_firmware
    entity_category: config
    on_press:
      then:
        - lambda: |-
            id(update_http_request).perform(true);

  - platform: template
    name: "Clear WizMote Pairing"
    id: wizmote_clear_button
    icon: "mdi:close-circle"
    entity_category: config
    on_press:
      - lambda: |-
          std::string mac = id(wizmote_mac_address).state;
          if (mac != "00:00:00:00:00:00" && mac != "" && mac.length() == 17) {
            std::array<uint8_t, 6> mac_bytes;
            int parsed = sscanf(mac.c_str(), "%hhx:%hhx:%hhx:%hhx:%hhx:%hhx",
                               &mac_bytes[0], &mac_bytes[1], &mac_bytes[2],
                               &mac_bytes[3], &mac_bytes[4], &mac_bytes[5]);
            if (parsed == 6) {
              id(espnow_component).del_peer(mac_bytes.data());
            }
          }
          id(wizmote_mac_address).publish_state("00:00:00:00:00:00");
      - lambda: 'id(wizmote_status).update();'

binary_sensor:
  - platform: status
    name: Online
    id: ink_ha_connected

  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
      ignore_strapping_warning: true
      mode:
        input: true
        pullup: true
    id: reset_button
    on_press:
      then:
        - lambda: |-
            id(button_press_timestamp) = millis();
    on_release:
      then:
        - lambda: |-
            if (millis() - id(button_press_timestamp) >= 8000) {
              id(factory_reset_switch).turn_on();
            }
            else if (millis() - id(button_press_timestamp) >= 1000) {
              // StatusCheck
              id(statusCheck).execute();
              delay(3000);
              id(testCycleCount) = 0;
              id(runTest) = true;
              id(testScript).execute();
            }

sensor:
  - platform: internal_temperature
    name: "ESP Temperature"
    id: sys_esp_temperature
    disabled_by_default: true

  - platform: uptime
    name: Uptime
    id: sys_uptime
    update_interval: 60s

switch:
  - platform: factory_reset
    id: factory_reset_switch
    disabled_by_default: true
  - platform: gpio
    pin: GPIO21
    name: Enable DAC
    id: enable_dac
    restore_mode: ALWAYS_ON
  - platform: template
    name: "WizMote Auto-Discovery"
    id: wizmote_discovery_mode
    icon: "mdi:radar"
    entity_category: config
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: 'id(wizmote_status).update();'
    on_turn_off:
      - lambda: 'id(wizmote_status).update();'

text_sensor:
  - platform: sendspin
    type: title
    name: Track Title

  - platform: sendspin
    type: artist
    name: Artist

  - platform: sendspin
    type: album
    name: Album

  - platform: version
    name: "ESPHome Version"
    hide_timestamp: true
    entity_category: "diagnostic"

  - platform: template
    name: "Apollo Firmware Version"
    id: apollo_firmware_version
    update_interval: never
    entity_category: "diagnostic"

  - platform: template
    name: "WizMote Status"
    id: wizmote_status
    icon: "mdi:information"
    entity_category: diagnostic
    update_interval: 300s
    lambda: |-
      std::string mac = id(wizmote_mac_address).state;
      bool discovery = id(wizmote_discovery_mode).state;
      if (discovery) {
        return std::string("Discovery mode active");
      } else if (mac == "00:00:00:00:00:00" || mac == "") {
        return std::string("No WizMote paired");
      } else {
        return std::string("Paired: " + mac);
      }

light:
  - platform: esp32_rmt_led_strip
    id: rgb_light
    name: "RGB Light"
    pin: GPIO4
    default_transition_length: 0s
    chipset: WS2812
    num_leds: 4
    rgb_order: grb
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 1000ms
          update_interval: 1000ms
          min_brightness: 50%
          max_brightness: 100%
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%

number:
  - platform: template
    name: Apollo CAST-1 Announce Volume
    id: announce_volume
    icon: mdi:volume-source
    unit_of_measurement: "%"
    min_value: 0
    max_value: 100
    step: 1
    restore_value: true
    initial_value: 50
    optimistic: true

remote_receiver:
  pin: 
    number: GPIO07
    inverted: true
    mode:
      input: true
  dump: all

audio_dac:
  - platform: pcm5122
    id: external_dac
    i2c_id: bus_a
    address: 0x4D
    bits_per_sample: 16bit

i2s_audio:
- id: i2s_out
  i2s_lrclk_pin: GPIO10
  i2s_bclk_pin: GPIO14
  
speaker:
  - platform: i2s_audio
    id: i2s_speaker_id
    i2s_audio_id: i2s_out
    sample_rate: 48000
    i2s_dout_pin: GPIO9
    bits_per_sample: 16bit
    dac_type: external
    channel: stereo
    timeout: never
    buffer_duration: 100ms

  - platform: mixer
    id: mixer_speaker_id
    output_speaker: i2s_speaker_id
    num_channels: 2
    task_stack_in_psram: true
    source_speakers:
      - id: announcement_mixer_input
        timeout: never
      - id: media_mixer_input
        timeout: never

  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixer_input
    task_stack_in_psram: true
    sample_rate: 48000
    bits_per_sample: 16


sendspin:
  id: sendspin_hub
  task_stack_in_psram: true

media_source:
  - platform: sendspin
    id: sendspin_source
    decode_memory: internal

  - platform: audio_http
    id: http_media_source
    buffer_size: 200000

  - platform: audio_http
    id: http_announcement_source
    buffer_size: 200000

media_player:
  - platform: sendspin
    id: sendspin_group_media_player
    name: "Apollo CAST-1 Sendspin Player"

  - platform: speaker_source
    id: external_media_player
    name: "Apollo CAST-1 Player"
    volume_increment: 0.05

    announcement_pipeline:
      format: FLAC     # FLAC is the least processor intensive codec
      num_channels: 1  # Stereo audio is unnecessary for announcements
      sample_rate: 48000
      speaker: announcement_mixer_input
      sources:
        - http_announcement_source

    media_pipeline:
      speaker: media_resampling_speaker
      format: FLAC     # FLAC is the least processor intensive codec
      num_channels: 2
      sample_rate: 48000
      sources:
        - sendspin_source
        - http_media_source

    on_announcement:
      - if:
          condition:
            - lambda: return (!id(announcement_triggered));
          then:
            - lambda: |-
                id(announcement_triggered) = true;
                id(current_volume) = id(external_media_player).volume;
            - light.turn_on:
                id: rgb_light
                blue: 100%
                red: 0%
                green: 100%
                brightness: 50%
            - mixer_speaker.apply_ducking:
                id: media_mixer_input
                decibel_reduction: 40
                duration: 0.0s
            - wait_until:
                media_player.is_announcing: external_media_player
            - delay: 0.75s
            - media_player.volume_set:
                id: external_media_player
                volume: !lambda "return id(announce_volume).state / 100.0;"
            - wait_until:
                - not:
                    media_player.is_announcing: external_media_player
            - mixer_speaker.apply_ducking:
                id: media_mixer_input
                decibel_reduction: 0
                duration: 1.0s
            - media_player.volume_set:
                id: external_media_player
                volume: !lambda "return id(current_volume);"
            - light.turn_off:
                id: rgb_light
            - lambda: id(announcement_triggered) = false;

    on_state:
      # Core pcm5122 boots muted; nothing else unmutes the external DAC, so
      # unmute it on every state change (idempotent).
      - audio_dac.mute_off: external_dac
      - if:
          condition:
            and:
              - lambda: return (!id(announcement_triggered));
              - not:
                  media_player.is_announcing: external_media_player
          then:
            - mixer_speaker.apply_ducking:
                id: media_mixer_input
                decibel_reduction: 0
                duration: 1.0s





script:
  - id: statusCheck
    then:
      - if:
          condition:
            - lambda: 'return id(ink_ha_connected).state;'
          then:
            - logger.log: "Apollo Automation: Connected To HA"
            - light.turn_on: 
                id: rgb_light
                brightness: 100%
                red: 0%
                green: 0%
                blue: 100%
      - delay: 5s
      - light.turn_off: rgb_light
  
  - id: testScript
    then:
      if: 
        condition:
          - lambda: "return id(runTest) == true;"
        then:
          - lambda: "id(runTest) = false;"
          - lambda: "id(testCycleCount) = 0;"
          - delay: 2s
          - while:
              condition:
                - lambda: "return id(testCycleCount) < 5;"
              then:
                - lambda: "id(runTest) = false;"
                - delay: 1s
                - lambda: "id(testCycleCount) += 1;"

          ## TODO: Update
          - if:
              condition:
                - lambda: "return true;"
              then:
                - lambda: "id(runTest) = false;"
                - light.turn_on:
                    id: rgb_light
                    red: 0%
                    green: 100%
                    blue: 0%
                - delay: 5s
                - light.turn_on:
                    id: rgb_light
                    red: 0%
                    green: 0%
                    blue: 0%
                - light.turn_off:
                    id: rgb_light
                
              else:
                - lambda: "id(runTest) = false;"
                - light.turn_on:
                    id: rgb_light
                    red: 100%
                    green: 0%
                    blue: 0%
                - delay: 5s
                - light.turn_on:
                    id: rgb_light
                    red: 0%
                    green: 0%
                    blue: 0%
                - light.turn_off:
                    id: rgb_light

  # WizMote button -> action mapping
  - id: process_wizmote_button
    parameters:
      button: int
    then:
      # ON -> play / resume
      - if:
          condition:
            lambda: 'return button == ${WIZMOTE_BUTTON_ON};'
          then:
            - media_player.play: sendspin_group_media_player
      # OFF -> pause
      - if:
          condition:
            lambda: 'return button == ${WIZMOTE_BUTTON_OFF};'
          then:
            - media_player.pause: sendspin_group_media_player
      # Scene 1 -> previous track
      - if:
          condition:
            lambda: 'return button == ${WIZMOTE_BUTTON_1};'
          then:
            - media_player.previous: sendspin_group_media_player
      # Scene 2 -> next track
      - if:
          condition:
            lambda: 'return button == ${WIZMOTE_BUTTON_2};'
          then:
            - media_player.next: sendspin_group_media_player
      # Scene 3 -> fire HA event (map to a playlist/favorite in Home Assistant)
      - if:
          condition:
            lambda: 'return button == ${WIZMOTE_BUTTON_3};'
          then:
            - homeassistant.event:
                event: esphome.cast1_wizmote_scene_3
      # Scene 4 -> fire HA event (map to a playlist/favorite in Home Assistant)
      - if:
          condition:
            lambda: 'return button == ${WIZMOTE_BUTTON_4};'
          then:
            - homeassistant.event:
                event: esphome.cast1_wizmote_scene_4
      # Bright + -> volume up (this speaker)
      - if:
          condition:
            lambda: 'return button == ${WIZMOTE_BUTTON_BRIGHT_UP};'
          then:
            - media_player.volume_up: external_media_player
      # Bright - -> volume down (this speaker)
      - if:
          condition:
            lambda: 'return button == ${WIZMOTE_BUTTON_BRIGHT_DOWN};'
          then:
            - media_player.volume_down: external_media_player
      # Night -> toggle the RGB light
      - if:
          condition:
            lambda: 'return button == ${WIZMOTE_BUTTON_NIGHT};'
          then:
            - light.toggle: rgb_light

# ---------------------------------------------------------------------------
# WizMote remote (ESP-NOW). The espnow: block carries no channel here so it
# follows the WiFi channel on CAST-1_W; CAST-1_ETH adds a channel + scan.
# ---------------------------------------------------------------------------
espnow:
  id: espnow_component
  auto_add_peer: false
  enable_on_boot: true
  on_unknown_peer:
    then:
      - lambda: |-
          char mac_str[18];
          snprintf(mac_str, sizeof(mac_str), "%02x:%02x:%02x:%02x:%02x:%02x",
                   info.src_addr[0], info.src_addr[1], info.src_addr[2],
                   info.src_addr[3], info.src_addr[4], info.src_addr[5]);
          std::string sender_mac(mac_str);

          if (size != 13) return;

          uint8_t button = data[12];
          bool discovery_mode = id(wizmote_discovery_mode).state;

          if (discovery_mode) {
            ESP_LOGI("wizmote", "Discovery: WizMote MAC: %s, Button: %d", sender_mac.c_str(), button);
            std::string current_mac = id(wizmote_mac_address).state;
            if (current_mac == "00:00:00:00:00:00" || current_mac == "" || current_mac != sender_mac) {
              auto call = id(wizmote_mac_address).make_call();
              call.set_value(sender_mac);
              call.perform();
              id(wizmote_discovery_mode).turn_off();
            }
            return;
          }

          ESP_LOGI("wizmote", "Unknown WizMote: %s (enable discovery mode to pair)", sender_mac.c_str());
  on_broadcast:
    then:
      - lambda: |-
          char mac_str[18];
          snprintf(mac_str, sizeof(mac_str), "%02x:%02x:%02x:%02x:%02x:%02x",
                   info.src_addr[0], info.src_addr[1], info.src_addr[2],
                   info.src_addr[3], info.src_addr[4], info.src_addr[5]);
          std::string sender_mac(mac_str);

          if (size != 13) return;

          std::string configured_mac = id(wizmote_mac_address).state;
          std::transform(configured_mac.begin(), configured_mac.end(), configured_mac.begin(), ::tolower);

          if (configured_mac == "00:00:00:00:00:00" || configured_mac == "" || sender_mac != configured_mac) return;

          // Note the last valid packet so the ETH channel-scan can lock on.
          id(wizmote_last_packet_ms) = millis();

          uint32_t sequence = (data[4] << 24) | (data[3] << 16) | (data[2] << 8) | data[1];
          uint8_t button = data[6];

          if (sequence == id(wizmote_last_sequence)) return;
          id(wizmote_last_sequence) = sequence;

          ESP_LOGI("wizmote", "Button: %d seq=%d from %s", button, sequence, sender_mac.c_str());
          id(process_wizmote_button).execute(button);

text:
  - platform: template
    name: "WizMote MAC Address"
    id: wizmote_mac_address
    icon: "mdi:remote"
    entity_category: config
    initial_value: "${WIZMOTE_MAC_ADDRESS}"
    optimistic: true
    restore_value: true
    mode: text
    min_length: 17
    max_length: 17
    on_value:
      - lambda: |-
          std::string mac = x;
          bool valid = true;
          for (int i = 0; i < 17; i++) {
            if (i % 3 == 2) { if (mac[i] != ':') { valid = false; break; } }
            else { if (!std::isxdigit(mac[i])) { valid = false; break; } }
          }
          if (!valid) {
            ESP_LOGW("wizmote", "Invalid MAC: %s", mac.c_str());
            return;
          }
      - if:
          condition:
            lambda: 'return (id(wizmote_previous_mac) != "" && id(wizmote_previous_mac) != "00:00:00:00:00:00");'
          then:
            - espnow.peer.delete:
                address: !lambda |-
                  std::string mac = id(wizmote_previous_mac);
                  std::array<uint8_t, 6> mac_bytes;
                  sscanf(mac.c_str(), "%hhx:%hhx:%hhx:%hhx:%hhx:%hhx",
                         &mac_bytes[0], &mac_bytes[1], &mac_bytes[2],
                         &mac_bytes[3], &mac_bytes[4], &mac_bytes[5]);
                  return mac_bytes;
      - if:
          condition:
            lambda: 'return (x != "00:00:00:00:00:00" && x != "");'
          then:
            - espnow.peer.add:
                address: !lambda |-
                  std::string mac = x;
                  std::array<uint8_t, 6> mac_bytes;
                  sscanf(mac.c_str(), "%hhx:%hhx:%hhx:%hhx:%hhx:%hhx",
                         &mac_bytes[0], &mac_bytes[1], &mac_bytes[2],
                         &mac_bytes[3], &mac_bytes[4], &mac_bytes[5]);
                  return mac_bytes;
      - lambda: 'id(wizmote_previous_mac) = x;'
      - lambda: 'id(wizmote_status).update();'

esphome:
  on_boot:
    # Re-add the saved WizMote peer after ESP-NOW is up.
    - priority: -100
      then:
        - delay: 2s
        - if:
            condition:
              lambda: |-
                std::string mac = id(wizmote_mac_address).state;
                return (mac != "00:00:00:00:00:00" && mac != "");
            then:
              - logger.log: "Restoring WizMote pairing on boot..."
              - espnow.peer.add:
                  address: !lambda |-
                    std::string mac = id(wizmote_mac_address).state;
                    std::array<uint8_t, 6> mac_bytes;
                    sscanf(mac.c_str(), "%hhx:%hhx:%hhx:%hhx:%hhx:%hhx",
                           &mac_bytes[0], &mac_bytes[1], &mac_bytes[2],
                           &mac_bytes[3], &mac_bytes[4], &mac_bytes[5]);
                    return mac_bytes;