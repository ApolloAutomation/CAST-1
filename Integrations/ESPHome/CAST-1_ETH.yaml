
esphome:
  name: "apollo-cast-1-eth"
  friendly_name: Apollo CAST-1
  comment: Apollo CAST-1
  name_add_mac_suffix: true
  platformio_options:
    board_build.flash_mode: dio

  project:
    name: "ApolloAutomation.CAST-1-ETH"
    version: ${version}

  min_version: 2026.6.0

  on_boot:
    - priority: 800
      then:
        - if:
            condition:
              - lambda: "return id(runTest);"
            then:
              - lambda: "id(testScript).execute();"
    - priority: 500
      then:
        - text_sensor.template.publish:
            id: apollo_firmware_version
            state: "${version}"

dashboard_import:
  package_import_url: github://ApolloAutomation/CAST-1/Integrations/ESPHome/CAST-1_ETH.yaml
  import_full_config: false

ota:
  - platform: esphome
    id: ota_esphome
  - platform: http_request
    id: ota_managed

safe_mode:

update:
  - platform: http_request
    id: update_http_request
    name: Firmware Update
    source: https://apolloautomation.github.io/CAST-1/firmware-e/manifest.json

logger:

ethernet:
  type: W5500
  clock_speed: 40MHz
  clk_pin: GPIO7
  mosi_pin: GPIO12
  miso_pin: GPIO11
  cs_pin: GPIO6
  interrupt_pin: GPIO13
  reset_pin: GPIO21

select:
  - platform: template
    id: firmware_selector
    name: Firmware Type
    icon: "mdi:test-tube"
    entity_category: config
    optimistic: true
    restore_value: true
    options:
      - "WiFi"
      - "Ethernet"
    initial_option: "Ethernet"
    on_value:
      then:
        - script.execute: apply_ota_source

text_sensor:
  - platform: ethernet_info
    ip_address:
      name: "IP Address"
      id: eth_ip
      entity_category: "diagnostic"

# ESP-NOW has no WiFi to follow on the Ethernet variant, so it needs a
# starting channel. The interval below scans channels until the WizMote is
# heard, then holds. (The espnow handlers/entities live in Core.yaml.)
espnow:
  channel: 1

interval:
  - interval: 2s
    then:
      - if:
          condition:
            lambda: |-
              std::string mac = id(wizmote_mac_address).state;
              bool want = id(wizmote_discovery_mode).state ||
                          (mac != "00:00:00:00:00:00" && mac != "");
              return want && (millis() - id(wizmote_last_packet_ms) > 30000);
          then:
            - lambda: |-
                id(wizmote_scan_channel)++;
                if (id(wizmote_scan_channel) > 13) id(wizmote_scan_channel) = 1;
            - espnow.set_channel:
                channel: !lambda 'return id(wizmote_scan_channel);'
            - logger.log:
                format: "WizMote channel scan: trying channel %d"
                args: ['id(wizmote_scan_channel)']

packages:
  core: !include Core.yaml
