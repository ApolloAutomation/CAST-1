name: CI

on:
  pull_request:

permissions:
  contents: read

# Label check lives in label-check.yml on pull_request_target so it can
# label fork-submitted PRs; plain pull_request tokens are read-only there.
jobs:
  ci:
    name: CI
    uses: ApolloAutomation/Workflows/.github/workflows/esphome-ci.yml@main
    with:
      yaml-files: |
        Integrations/ESPHome/CAST-1_ETH.yaml
        Integrations/ESPHome/CAST-1_W.yaml
      # dev excluded until the TemplateSelect .state incompatibility is fixed
      esphome-versions: |
        stable
        beta

